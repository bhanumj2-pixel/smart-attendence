<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Attendance System</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Smart AI Attendance System</h1>
        
        <div class="controls">
            <input type="text" id="name" placeholder="Student Name">
            <input type="text" id="roll" placeholder="Roll Number">
            
            <select id="intervalSelect">
                <option value="5000">5 Seconds (Testing Mode)</option>
                <option value="60000">1 Minute</option>
                <option value="300000">5 Minutes</option>
            </select>

            <button id="cameraBtn">Open Camera</button>
            <button id="registerBtn">Register Student</button>
            <button id="startTrackingBtn">Start Live Tracking</button>
        </div>

        <div id="systemFeedback" style="text-align: center; font-size: 16px; color: #00ffd5; margin-bottom: 20px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 5px;">
            Initializing AI Engine... Please Wait.
        </div>

        <div class="camera-box" style="position: relative; max-width: 640px; background: #000; border-radius: 8px; overflow: hidden; margin: 0 auto;">
            <video id="video" autoplay playsinline muted style="width: 100%; display: block;"></video>
            <canvas id="canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></canvas>
        </div>

        <h2>Registered Students</h2>
        <div id="studentsBox" style="display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; justify-content: center;"></div>

        <h2>Attendance Records</h2>
        <table>
            <thead>
                <tr>
                    <th>Photo</th>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Activity</th>
                    <th>Date & Time</th>
                </tr>
            </thead>
            <tbody id="attendanceBody"></tbody>
        </table>
    </div>
</body>
</html>
